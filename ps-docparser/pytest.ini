[pytest]
# 테스트 탐색 경로
testpaths = tests

# 테스트 파일/함수 네이밍 규칙
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 마커 정의 (선택적 스킵용)
markers =
    slow: 1초 이상 걸리는 테스트 (CI에서 --slow 옵션으로만 실행)
    integration: 실제 파일/DB를 사용하는 통합 테스트
    api: 실제 API 호출 (CI에서 기본 스킵)
    windows_only: Windows 전용 테스트
    macos_only: macOS 전용 테스트

# 기본 옵션
addopts =
    --strict-markers
    --tb=short
    -v
    --durations=10
    -p no:cacheprovider
    --cov=.
    --cov-fail-under=70
    --cov-report=term-missing

# 경고 봉쇄 (Phase 13)
# zai SDK: Pydantic v1 미지원 경고 — 업스트림 v2 대응 릴리스 대기 (재확인: 2026-10-22)
# google.genai: _UnionGenericAlias Python 3.17 이전 무해 — 업스트림 릴리스 대기 (재확인: 2026-10-22)
filterwarnings =
    ignore:Core Pydantic V1 functionality:UserWarning
    ignore:.*_UnionGenericAlias.*:DeprecationWarning

# 로깅 (테스트 실패 시 로그 출력)
log_cli = false
log_cli_level = WARNING
